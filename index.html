<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027 성서선교회 목사 안수 성경 암송 도우미</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            flex-content: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 20px;
            word-break: keep-all;
        }

        /* 슬라이드 컨테이너 */
        .slider-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-container {
            display: flex;
            transition: transform 0.3s ease-in-out;
            width: 100%;
        }

        .verse-card {
            min-width: 100%;
            box-sizing: border-box;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 250px;
        }

        .verse-info {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        /* 블러 처리 스타일 */
        .verse-text {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #2c3e50;
            word-break: keep-all;
            transition: filter 0.3s ease, opacity 0.3s ease;
        }

        .verse-text.blurred {
            filter: blur(6px);
            user-select: none; /* 드래그 방지 */
            pointer-events: none;
        }

        /* 제어 버튼 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            gap: 10px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            flex: 1;
        }

        button:active {
            background-color: #1a252f;
        }

        button.btn-toggle {
            background-color: var(--accent-color);
        }

        button.btn-toggle:active {
            background-color: #2980b9;
        }

        .page-indicator {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>2027 성서선교회 목사 안수 성경 암송 도우미</h1>

    <!-- 슬라이더 영역 -->
    <div class="slider-wrapper">
        <div class="card-container" id="cardContainer">
            <!-- 자바스크립트에서 구절 카드가 동적으로 삽입됩니다 -->
        </div>
    </div>

    <!-- 페이지 표시 -->
    <div class="page-indicator" id="pageIndicator">1 / 5</div>

    <!-- 하단 조작 버튼 -->
    <div class="nav-buttons">
        <button onclick="prevVerse()">◀ 이전</button>
        <button class="btn-toggle" onclick="toggleBlur()">보이기 / 가리기</button>
        <button onclick="nextVerse()">다음 ▶</button>
    </div>
</div>

<script>
    // 목사고시 암송 구절 데이터 (필요시 이 배열에 구절을 추가/수정 하시면 됩니다)
    const verses = [
        { info: "로마서 12:1–2 (헌신과 변화)", text: "그러므로 형제들아 내가 하나님의 모든 자비하심으로 너희를 권하노니 너희 몸을 하나님이 기뻐하시는 거룩한 산 제물로 드리라 이는 너희가 드릴 영적 예배니라 너희는 이 세대를 본받지 말고 오직 마음을 새롭게 함으로 변화를 받아 하나님의 선하시고 기뻐하시고 온전하신 뜻이 무엇인지 분별하도록 하라" },
        { info: "디모데후서 4:2 (말씀 전파)", text: "너는 말씀을 전파하라 때를 얻든지 못 얻든지 항상 힘쓰라 범사에 오래 참음과 가르침으로 경책하며 경계하며 권하라" },
        { info: "베드로전서 5:2–3 (양 무리를 치는 자세)", text: "너희 중에 있는 하나님의 양 무리를 치되 억지로 하지 말고 하나님의 뜻을 따라 자원함으로 하며 더러운 이득을 위하여 하지 말고 기꺼이 하며 맡은 자들에게 주장하는 자세를 하지 말고 양 무리의 본이 되라" },
        { info: "사도행전 20:24 (사명의 완수)", text: "내가 달려갈 길과 주 예수께 받은 사명 곧 하나님의 은혜의 복음을 증언하는 일을 마치려 함에는 나의 생명조차 조금도 귀한 것으로 여기지 아니하노라" },
        { info: "디모데전서 4:12 (믿는 자의 본)", text: "누구든지 네 연함을 업신여기지 못하게 하고 오직 말과 행실과 사랑과 믿음과 정절에 있어서 믿는 자에게 본이 되어" }
    ];

    let currentIndex = 0;
    let isBlurred = false;

    const cardContainer = document.getElementById('cardContainer');
    const pageIndicator = document.getElementById('pageIndicator');

    // 초기 카드 생성 및 배치
    function initSlider() {
        cardContainer.innerHTML = '';
        verses.forEach((v) => {
            const card = document.createElement('div');
            card.className = 'verse-card';
            
            card.innerHTML = `
                <div class="verse-info">${v.info}</div>
                <div class="verse-text">${v.text}</div>
            `;
            cardContainer.appendChild(card);
        });
        updateSlider();
    }

    // 슬라이드 화면 전환 및 상태 업데이트
    function updateSlider() {
        // 좌우 슬라이드 이동 효과
        cardContainer.style.transform = `translateX(-${currentIndex * 100}%)`;
        pageIndicator.textContent = `${currentIndex + 1} / ${verses.length}`;
        
        // 다음 구절로 넘어갈 때 기본적으로 블러를 해제하고 싶다면 아래 주석을 푸세요
        // isBlurred = false; 
        
        applyBlurStatus();
    }

    // 블러 상태 적용 함수
    function applyBlurStatus() {
        const texts = document.querySelectorAll('.verse-text');
        texts.forEach((text, index) => {
            if (index === currentIndex && isBlurred) {
                text.classList.add('blurred');
            } else {
                text.classList.remove('blurred');
            }
        });
    }

    // 보이기/가리기 토글
    function toggleBlur() {
        isBlurred = !isBlurred;
        applyBlurStatus();
    }

    // 이전 구절 이동
    function prevVerse() {
        if (currentIndex > 0) {
            currentIndex--;
            updateSlider();
        } else {
            // 처음 구절이면 마지막 구절로 이동 (루프)
            currentIndex = verses.length - 1;
            updateSlider();
        }
    }

    // 다음 구절 이동
    function nextVerse() {
        if (currentIndex < verses.length - 1) {
            currentIndex++;
            updateSlider();
        } else {
            // 마지막 구절이면 처음 구절로 이동 (루프)
            currentIndex = 0;
            updateSlider();
        }
    }

    // 모바일 터치 슬라이드(스와이프) 지원
    let startX = 0;
    let endX = 0;

    document.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
    });

    document.addEventListener('touchend', e => {
        endX = e.changedTouches[0].clientX;
        if (startX - endX > 50) {
            nextVerse(); // 왼쪽으로 밀면 다음 구절
        } else if (endX - startX > 50) {
            prevVerse(); // 오른쪽으로 밀면 이전 구절
        }
    });

    // 실행
    initSlider();
</script>

</body>
</html>
